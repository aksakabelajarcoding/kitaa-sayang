<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satria & Ayu Forever</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <section class="glass-card header">
            <h1 class="title">Together Forever</h1>
            <div id="countdown" class="days-counter">Menghitung hari...</div>
            <p class="date-text">Sejak 1 November 2025</p>
        </section>

        <section class="glass-card photo-section">
            <div class="photo-container">
                <div class="photo-item">
                    <img src="https://files.catbox.moe/4r50v9.jpeg" alt="Satria">
                    <span>Satria</span>
                </div>
                <div class="heart-icon">❤️</div>
                <div class="photo-item">
                    <img src="https://files.catbox.moe/cagb4t.jpg" alt="Ayu">
                    <span>Ayu</span>
                </div>
            </div>
            <p class="caption">"Takdir mempertemukan kita."</p>
        </section>

        <section class="glass-card music-section">
            <div class="cassette-container">
                <div class="cassette" id="cassette">
                    <div class="cassette-label" id="current-title">Pilih Lagu Kita...</div>
                    <div class="tape-hole left"></div>
                    <div class="tape-hole right"></div>
                </div>
            </div>
            
            <div class="playlist-grid">
                <div class="playlist-col">
                    <h4>🎀 Ayu's Faves</h4>
                    <button class="btn-music" onclick="playMusic('https://files.catbox.moe/bza5fc.mp3', 'Best Part')">Best Part</button>
                    <button class="btn-music" onclick="playMusic('https://files.catbox.moe/frpeqg.mp3', 'Kiss It Better')">Kiss It Better</button>
                </div>
                <div class="playlist-col">
                    <h4>🎧 Satria's Faves</h4>
                    <button class="btn-music" onclick="playMusic('https://files.catbox.moe/8rjj1f.m4a', 'Kota Ini Tak Sama')">Kota Ini Tak Sama</button>
                    <button class="btn-music" onclick="playMusic('https://files.catbox.moe/mqv2u8.mp3', 'Bahagia Lagi')">Bahagia Lagi</button>
                </div>
            </div>
            <audio id="audio-player"></audio>
        </section>

        <section class="glass-card calculator">
            <h3>Love Calculator</h3>
            <div class="calc-box">
                <input type="text" id="calc-display" placeholder="Satria + Ayu =" readonly>
                <button class="btn-calc" onclick="calculateLove()">HITUNG</button>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
